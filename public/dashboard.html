<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Pipeline | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <span class="text-xl font-bold text-blue-600 tracking-tight">FinData<span
                    class="text-gray-800">Pro</span></span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#"
                class="flex items-center gap-3 px-3 py-2 bg-blue-50 text-blue-700 rounded-lg font-medium transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
                Dashboard
            </a>
            <a href="/"
                class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                </svg>
                Upload Documents
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">

        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
            <h1 class="text-2xl font-semibold text-gray-800">Transactions Overview</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-gray-500">Admin User</span>
                <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold">A
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500 mb-1">Total Processed</p>
                    <h3 class="text-3xl font-bold text-gray-900" id="kpi-count">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500 mb-1">Total Volume (USD)</p>
                    <h3 class="text-3xl font-bold text-blue-600" id="kpi-volume">$0.00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500 mb-1">Avg Confidence</p>
                    <h3 class="text-3xl font-bold text-green-600" id="kpi-confidence">0%</h3>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-sm font-medium text-gray-500 mb-1">Requires Review</p>
                    <h3 class="text-3xl font-bold text-amber-500" id="kpi-review">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm lg:col-span-2">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Processing Volume Trend</h2>
                    <div class="h-64 relative w-full">
                        <canvas id="volumeChart"></canvas>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Confidence Distribution</h2>
                    <div class="h-64 relative w-full flex justify-center">
                        <canvas id="confidenceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Recent Transactions</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse" id="dataTable">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider">
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Invoice #</th>
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Vendor</th>
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Date</th>
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Amount</th>
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Confidence</th>
                                <th class="px-6 py-4 font-medium border-b border-gray-100">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm text-gray-700">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api/transactions')
                .then(res => res.json())
                .then(data => {

                    // --- 1. Calculate KPIs ---
                    const totalProcessed = data.length;
                    const totalVolume = data.reduce((sum, item) => sum + (item.amount || 0), 0);
                    const avgConf = totalProcessed > 0
                        ? data.reduce((sum, item) => sum + (item.confidenceScore || 0), 0) / totalProcessed
                        : 0;
                    const reviewNeeded = data.filter(item => (item.confidenceScore || 0) < 0.8).length;

                    document.getElementById('kpi-count').innerText = totalProcessed;
                    document.getElementById('kpi-volume').innerText = `$${totalVolume.toLocaleString('en-US', { minimumFractionDigits: 2 })}`;
                    document.getElementById('kpi-confidence').innerText = `${(avgConf * 100).toFixed(1)}%`;
                    document.getElementById('kpi-review').innerText = reviewNeeded;

                    // --- 2. Populate Table ---
                    const tbody = document.querySelector('#dataTable tbody');
                    if (data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No transactions processed yet.</td></tr>`;
                    } else {
                        data.forEach(item => {
                            const confScore = (item.confidenceScore * 100).toFixed(0);

                            // Badge Logic
                            let badgeClass = "bg-green-100 text-green-700";
                            if (confScore < 80) badgeClass = "bg-red-100 text-red-700";
                            else if (confScore < 95) badgeClass = "bg-amber-100 text-amber-700";

                            tbody.innerHTML += `
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="px-6 py-4 font-medium text-gray-900">${item.invoiceNumber || 'N/A'}</td>
                                    <td class="px-6 py-4">${item.vendorName || 'N/A'}</td>
                                    <td class="px-6 py-4 whitespace-nowrap">${item.date || 'N/A'}</td>
                                    <td class="px-6 py-4 font-medium text-gray-900">${item.currency || '$'} ${item.amount ? item.amount.toLocaleString('en-US', { minimumFractionDigits: 2 }) : '0.00'}</td>
                                    <td class="px-6 py-4">
                                        <span class="px-2.5 py-1 text-xs font-medium rounded-full ${badgeClass}">
                                            ${confScore}%
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-blue-600 hover:text-blue-800 cursor-pointer text-sm font-medium">View</td>
                                </tr>
                            `;
                        });
                    }

                    // --- 3. Render Charts ---
                    // Prepare data for Confidence Chart
                    const highConf = data.filter(d => d.confidenceScore >= 0.9).length;
                    const medConf = data.filter(d => d.confidenceScore >= 0.8 && d.confidenceScore < 0.9).length;
                    const lowConf = reviewNeeded;

                    new Chart(document.getElementById('confidenceChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['High (>90%)', 'Medium (80-90%)', 'Review Required (<80%)'],
                            datasets: [{
                                data: [highConf, medConf, lowConf],
                                backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                    });

                    // Prepare mock trend data based on actual transactions
                    new Chart(document.getElementById('volumeChart'), {
                        type: 'bar',
                        data: {
                            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                            datasets: [{
                                label: 'Processed Volume ($)',
                                data: [0, 0, 0, 0, totalVolume, 0, 0], // In reality, aggregate by date
                                backgroundColor: '#3b82f6',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { y: { beginAtZero: true, grid: { borderDash: [2, 4] } }, x: { grid: { display: false } } },
                            plugins: { legend: { display: false } }
                        }
                    });
                });
        });
    </script>
</body>

</html>
